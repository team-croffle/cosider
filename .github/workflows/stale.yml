name: Stale

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: '30일간 활동이 없어 stale 처리되었습니다. 7일 내 활동이 없으면 자동으로 닫힙니다.'
          stale-pr-message: '30일간 활동이 없어 stale 처리되었습니다. 7일 내 활동이 없으면 자동으로 닫힙니다.'
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned,security'
