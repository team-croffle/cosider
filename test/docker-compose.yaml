services:
  valkey:
    image: valkey/valkey:latest
    container_name: cosider-test-valkey
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: cosider-test-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 admin minioadminpassword); do
        echo 'Waiting for MinIO server...' && sleep 1;
      done;
      /usr/bin/mc admin user add local cosider cosider123 || true;
      /usr/bin/mc admin policy attach local readwrite --user cosider || true;
      /usr/bin/mc mb local/cosider || true;
      echo 'User provisioning completed.';
      exit 0;
      "

volumes:
  valkey_data:
  minio_data:
